---
layout: base
---

<article class="page" role="article">
  <header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.description %}
    <p class="page-description">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="markdown-body page-content">
    {{ content }}
  </div>
</article>
